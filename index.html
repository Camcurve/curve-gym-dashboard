<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#131313">
<title>Gym Tracker — Curve</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@300,400,500,700,800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #131313;
  --surface:      #1c1b1b;
  --surface2:     #201f1f;
  --border:       rgba(255,255,255,0.09);
  --border-soft:  rgba(255,255,255,0.04);
  --accent:       #FF5F00;
  --accent-dim:   rgba(255,95,0,0.10);
  --accent-glow:  rgba(255,95,0,0.20);
  --accent-border:rgba(255,95,0,0.30);
  --text:         #E5E2E1;
  --text-muted:   rgba(229,226,225,0.45);
  --text-faint:   rgba(229,226,225,0.15);
  --green:        #22c55e;
  --yellow:       #eab308;
  --red:          #ef4444;
  --blue:         #3b82f6;
  --purple:       #a855f7;
  --font:         'Cabinet Grotesk', 'DM Sans', system-ui, sans-serif;
  --radius:       10px;
  --radius-sm:    6px;
  --safe-bottom:  env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
}
::-webkit-scrollbar { display: none; }
body { overflow-x: hidden; }
.app { min-height: 100vh; display: flex; flex-direction: column; position: relative; }

.ambient-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 90% 50% at 50% 100%, rgba(255,95,0,0.07) 0%, rgba(180,50,3,0.03) 40%, transparent 70%);
  animation: glowBreathe 10s ease-in-out infinite;
}
@keyframes glowBreathe { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ── Header ────────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; position: sticky; top: 0; z-index: 20;
  background: rgba(19,19,19,0.92); backdrop-filter: blur(20px);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-wordmark {
  font-size: 32px; font-weight: 800; letter-spacing: -0.04em;
  text-transform: lowercase; color: var(--text); line-height: 0.85;
}
.logo-divider { width: 1px; height: 22px; background: var(--border); }
.logo-sub {
  font-size: 9px; font-weight: 600; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-muted);
}
.header-actions { display: flex; gap: 8px; }
.btn-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all 0.2s;
}
.btn-icon:active { transform: scale(0.92); background: var(--surface2); }

/* ── Goal selector ────────────────────────────────────────────── */
.goal-bar {
  display: flex; gap: 6px; padding: 10px 14px;
  background: rgba(19,19,19,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 19;
}
.goal-chip {
  flex: 1; padding: 8px 10px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); font-family: var(--font);
  font-size: 10px; font-weight: 700; text-align: center;
  cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  letter-spacing: 0.1em; line-height: 1.1;
}
.goal-chip:active { transform: scale(0.96); }
.goal-chip .goal-sub { font-size: 8px; font-weight: 500; letter-spacing: 0.06em; margin-top: 2px; display: block; opacity: 0.7; }
.goal-chip.cut.active { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); color: var(--red); }
.goal-chip.maintain.active { background: rgba(234,179,8,0.12); border-color: rgba(234,179,8,0.35); color: var(--yellow); }
.goal-chip.bulk.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.35); color: var(--green); }

/* ── Main ──────────────────────────────────────────────────────── */
.main {
  flex: 1; overflow-y: auto; padding: 16px 14px calc(80px + var(--safe-bottom));
  position: relative; z-index: 5; -webkit-overflow-scrolling: touch;
}

/* ── Stats ─────────────────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 14px 12px;
  display: flex; flex-direction: column; gap: 3px;
}
.stat-card.featured { grid-column: 1 / -1; background: rgba(255,95,0,0.05); border-color: var(--accent-border); }
.stat-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
.stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.stat-unit { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.stat-delta { font-size: 11px; font-weight: 600; }
.stat-delta.up { color: var(--green); }
.stat-delta.down { color: var(--red); }
.stat-delta.same { color: var(--yellow); }

/* ── Week chips ────────────────────────────────────────────────── */
.week-scroll {
  display: flex; gap: 6px; overflow-x: auto; padding: 0 0 14px;
  margin-bottom: 14px; -webkit-overflow-scrolling: touch;
}
.week-scroll::-webkit-scrollbar { display: none; }
.week-chip {
  flex-shrink: 0; padding: 7px 14px; border-radius: 16px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); font-family: var(--font);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.week-chip:active { transform: scale(0.95); }
.week-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.week-chip.has-data { border-color: rgba(34,197,94,0.3); }

/* ── Exercise cards ────────────────────────────────────────────── */
.exercise-list { display: flex; flex-direction: column; gap: 10px; }
.exercise-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s;
}
.exercise-card.has-data { border-color: rgba(34,197,94,0.15); }

.exercise-card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 16px 10px;
}
.exercise-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; display: flex; align-items: center; gap: 7px; }
.exercise-meta { font-size: 10px; font-weight: 500; color: var(--text-muted); margin-top: 3px; }

.method-badge {
  padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 800;
  letter-spacing: 0.1em; flex-shrink: 0;
}
.method-badge.rpt { background: rgba(255,95,0,0.12); color: var(--accent); }
.method-badge.kino { background: rgba(59,130,246,0.12); color: var(--blue); }

.exercise-badge {
  padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; white-space: nowrap;
}
.exercise-badge.up { background: rgba(34,197,94,0.12); color: var(--green); }
.exercise-badge.down { background: rgba(239,68,68,0.12); color: var(--red); }
.exercise-badge.same { background: rgba(234,179,8,0.12); color: var(--yellow); }
.exercise-badge.none { background: rgba(255,255,255,0.04); color: var(--text-faint); }

/* ── Set rows ──────────────────────────────────────────────────── */
.sets-container { padding: 0 16px 14px; }

.set-row {
  display: grid; grid-template-columns: 50px 1fr 1fr; gap: 8px;
  align-items: center; padding: 6px 0;
  border-bottom: 1px solid var(--border-soft);
}
.set-row:last-child { border-bottom: none; }

.set-label {
  font-size: 10px; font-weight: 700; color: var(--text-muted);
  text-align: center; line-height: 1.2;
}
.set-label .set-target-hint {
  display: block; font-size: 8px; font-weight: 600; color: var(--text-faint);
  margin-top: 1px;
}
.set-label.heavy { color: var(--accent); }

.set-header {
  display: grid; grid-template-columns: 50px 1fr 1fr; gap: 8px;
  padding: 0 0 6px; margin-bottom: 2px; border-bottom: 1px solid var(--border);
}
.set-header span {
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-faint); text-align: center;
}

.set-input {
  background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: var(--text); font-family: var(--font);
  font-size: 16px; font-weight: 600; text-align: center;
  padding: 10px 6px; outline: none; width: 100%;
  -webkit-appearance: none; -moz-appearance: textfield;
  transition: border-color 0.2s, background 0.2s;
}
.set-input:focus { border-color: rgba(255,95,0,0.5); background: rgba(255,95,0,0.05); }
.set-input::placeholder { color: var(--text-faint); font-weight: 400; }
.set-input.filled { border-color: rgba(34,197,94,0.2); }

.exercise-prev {
  display: flex; gap: 10px; padding: 8px 16px;
  background: rgba(255,255,255,0.015); border-top: 1px solid var(--border-soft);
  font-size: 10.5px; color: var(--text-muted);
}
.prev-label { font-weight: 500; }
.prev-value { font-weight: 600; color: var(--text); }

.card-progress-bar {
  height: 3px; background: rgba(255,255,255,0.04); overflow: hidden;
}
.card-progress-fill {
  height: 100%; transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
}

/* ── Nutrition ─────────────────────────────────────────────────── */
.macro-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.macro-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
}
.macro-card-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
.macro-card-value { font-size: 22px; font-weight: 700; line-height: 1.1; }
.macro-card-target { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.macro-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

.nutrition-day-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
}
.nutrition-day-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); margin-bottom: 10px; }
.nutrition-day-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.nutrition-input-group { display: flex; flex-direction: column; gap: 3px; }
.nutrition-input-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.nutrition-input {
  background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: var(--text); font-family: var(--font);
  font-size: 16px; font-weight: 600; text-align: center;
  padding: 10px 8px; outline: none; width: 100%; -webkit-appearance: none;
}
.nutrition-input:focus { border-color: rgba(255,95,0,0.5); background: rgba(255,95,0,0.05); }

/* ── Garmin sessions ───────────────────────────────────────────── */
.garmin-section { margin-top: 20px; }
.section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.garmin-badge {
  padding: 2px 7px; border-radius: 8px; font-size: 9px; font-weight: 700;
  background: rgba(0,185,229,0.12); color: #00b9e5; letter-spacing: 0.06em;
}

.garmin-list { display: flex; flex-direction: column; gap: 6px; }
.garmin-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.garmin-date { font-size: 13px; font-weight: 600; }
.garmin-day { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.garmin-stats { display: flex; gap: 14px; text-align: right; }
.garmin-stat-val { font-size: 14px; font-weight: 700; }
.garmin-stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

/* ── Chart ─────────────────────────────────────────────────────── */
.chart-section { margin-top: 20px; }
.chart-container {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 12px; position: relative; overflow: hidden;
}
.chart-container canvas { width: 100% !important; height: 200px !important; }
.chart-glow {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 70%; height: 80px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,95,0,0.08), transparent 70%);
  pointer-events: none; filter: blur(20px);
}

/* ── Bottom nav ────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(68px + var(--safe-bottom)); padding-bottom: var(--safe-bottom);
  background: rgba(19,19,19,0.95); backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; align-items: center; z-index: 20;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; color: var(--text-muted);
  font-family: var(--font); font-size: 9px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 8px 12px; cursor: pointer; transition: color 0.2s; position: relative;
}
.nav-btn.active { color: var(--accent); }
.nav-btn.active::after {
  content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
  width: 24px; height: 2px; background: var(--accent); border-radius: 1px;
}
.nav-icon { font-size: 16px; }

/* ── Coach box ─────────────────────────────────────────────────── */
.coach-box {
  background: var(--surface); border: 1px solid var(--accent-border);
  border-radius: var(--radius); padding: 16px 18px; margin-top: 20px;
  position: relative; overflow: hidden;
}
.coach-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), rgba(255,95,0,0.2));
}
.coach-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.coach-icon {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(255,95,0,0.1); border: 0.5px solid rgba(255,95,0,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.coach-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent);
}

.coach-goal-note {
  padding: 10px 12px; border-radius: 8px; margin-bottom: 14px;
  font-size: 11px; line-height: 1.5; font-weight: 500;
}
.coach-goal-note.cut { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.15); color: rgba(239,68,68,0.9); }
.coach-goal-note.maintain { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.15); color: rgba(234,179,8,0.9); }
.coach-goal-note.bulk { background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.15); color: rgba(34,197,94,0.9); }

.coach-warmup {
  padding: 10px 12px; border-radius: 8px; margin-bottom: 14px;
  background: rgba(168,85,247,0.06); border: 1px solid rgba(168,85,247,0.15);
  font-size: 11px; line-height: 1.6; color: var(--text-muted);
}
.coach-warmup strong { color: var(--purple); font-weight: 700; }
.coach-warmup .warmup-weight { color: var(--text); font-weight: 600; }

.coach-item {
  padding: 8px 0; border-bottom: 1px solid var(--border-soft);
  font-size: 13px; line-height: 1.45; color: var(--text);
}
.coach-item:last-child { border-bottom: none; padding-bottom: 0; }
.coach-exercise { font-weight: 600; display: flex; align-items: center; gap: 6px; }
.coach-rec { color: var(--text-muted); font-size: 12px; margin-top: 3px; line-height: 1.5; }
.coach-highlight { color: var(--green); font-weight: 600; }
.coach-warn { color: var(--yellow); font-weight: 600; }
.coach-accent { color: var(--accent); font-weight: 600; }
.coach-empty {
  font-size: 12px; color: var(--text-muted); padding: 8px 0; line-height: 1.5;
}

.coach-set-plan {
  display: grid; grid-template-columns: auto 1fr 1fr; gap: 4px 10px;
  margin-top: 6px; font-size: 11px; padding: 6px 8px;
  background: rgba(255,255,255,0.02); border-radius: 6px;
}
.coach-set-plan .csp-label { color: var(--text-muted); font-weight: 600; }
.coach-set-plan .csp-kg { color: var(--text); font-weight: 600; }
.coach-set-plan .csp-reps { color: var(--text-muted); font-weight: 500; }

/* ── Animations ────────────────────────────────────────────────── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease forwards; }

/* ── Desktop ───────────────────────────────────────────────────── */
@media (min-width: 768px) {
  .main { padding: 24px 32px 40px; max-width: 680px; margin: 0 auto; }
  .stats-row { grid-template-columns: repeat(4, 1fr); }
  .bottom-nav { display: none; }
  .tabs-desktop { display: flex !important; }
  .macro-summary { grid-template-columns: repeat(4, 1fr); }
}
.tabs-desktop {
  display: none; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--border);
}
.tab-btn {
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-muted); font-family: var(--font); font-size: 12px;
  font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 10px 16px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div class="ambient-glow"></div>

  <header class="header">
    <div class="logo">
      <span class="logo-wordmark">curve</span>
      <span class="logo-divider"></span>
      <span class="logo-sub">Gym Tracker</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon" onclick="exportData()" title="Export">&#8595;</button>
      <button class="btn-icon" onclick="importData()" title="Import">&#8593;</button>
    </div>
  </header>

  <div class="goal-bar" id="goalBar"></div>

  <main class="main">
    <div class="tabs-desktop" id="tabsDesktop"></div>
    <div class="stats-row fade-up" id="statsRow"></div>
    <div class="week-scroll" id="weekScroll"></div>
    <div id="tabContent"></div>
    <div class="chart-section fade-up" id="chartSection">
      <div class="section-title">Volume Over Time</div>
      <div class="chart-container">
        <canvas id="volumeChart"></canvas>
        <div class="chart-glow"></div>
      </div>
    </div>
    <div id="garminSection"></div>
    <div id="coachBox" class="fade-up"></div>
  </main>

  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<script>
// ── Exercise Data (Greek God 2.0 RPT Methodology) ────────────────────────
// method: 'rpt' = Reverse Pyramid Training, 'kino' = Kino Rep Training
// RPT: each set has its own rep target, weight drops ~10% per set
// Kino: same weight all sets, same rep target
const EXERCISES = {
  push: [
    { name: 'Incline Dumbbell Bench Press', sets: 4, method: 'rpt',
      targets: ['4-6', '6-8', '8-10', '10-12'] },
    { name: 'Smith Machine Bench Press', sets: 4, method: 'rpt',
      targets: ['6-8', '8-10', '10-12', '10-12'] },
    { name: 'Seated Shoulder Press', sets: 3, method: 'rpt',
      targets: ['4-6', '6-8', '8-10'] },
    { name: 'Tricep Pushdown (Cable)', sets: 3, method: 'rpt',
      targets: ['6-8', '8-10', '10-12'] },
    { name: 'Machine Chest Fly', sets: 3, method: 'kino',
      targets: ['12-15', '12-15', '12-15'] },
    { name: 'Abs (optional)', sets: 3, method: 'kino',
      targets: ['15-20', '15-20', '15-20'] },
  ],
  pull: [
    { name: 'Lat Pulldown', sets: 4, method: 'rpt',
      targets: ['4-6', '6-8', '8-10', '8-10'] },
    { name: 'Seated Cable Row', sets: 4, method: 'kino',
      targets: ['10-12', '10-12', '10-12', '10-12'] },
    { name: 'Machine Row (Upper Back)', sets: 3, method: 'kino',
      targets: ['10-12', '10-12', '10-12'] },
    { name: 'Barbell Curl', sets: 3, method: 'rpt',
      targets: ['6-8', '8-10', '10-12'] },
    { name: 'Hammer Curl (Dumbbell)', sets: 3, method: 'kino',

// Key: split|exercise|week|setNum  -> { kg, reps }
function getSet(split, name, week, setNum) {
  return data.sets[`${split}|${name}|${week}|${setNum}`] || { kg: '', reps: '' };
}
function setSetVal(split, name, week, setNum, field, val) {
  const key = `${split}|${name}|${week}|${setNum}`;
  if (!data.sets[key]) data.sets[key] = { kg: '', reps: '' };
  data.sets[key][field] = val;
  saveData();
  renderStats();

}

// ── Volume calculations ──────────────────────────────────────────────────
function getExerciseVolume(split, name, week) {
  const ex = EXERCISES[split].find(e => e.name === name);
  if (!ex) return 0;
  let total = 0;
  for (let s = 1; s <= ex.sets; s++) {
    const v = getSet(split, name, week, s);
    total += (parseFloat(v.kg) || 0) * (parseFloat(v.reps) || 0);
  }
  return total;
}

function getWeekVol(split, week) {
  let total = 0;
  for (const ex of EXERCISES[split]) total += getExerciseVolume(split, ex.name, week);
  return total;
}

function getTotalVol(week) {
  return getWeekVol('push', week) + getWeekVol('pull', week) + getWeekVol('leg', week);
}

function getExProgress(split, name, week) {
  if (week <= 1) return 'none';
  const cv = getExerciseVolume(split, name, week);
  const pv = getExerciseVolume(split, name, week - 1);
  if (!cv || !pv) return 'none';
  return cv > pv ? 'up' : cv < pv ? 'down' : 'same';
}

function getFilledWeeks() {
  const weeks = new Set();
  for (const key of Object.keys(data.sets)) {
    const v = data.sets[key];
    if (v.kg || v.reps) weeks.add(parseInt(key.split('|')[2]));
  }
  return weeks;
}

function countFilledExercises(split, week) {
  let filled = 0;
  for (const ex of EXERCISES[split]) {
    let hasSets = false;
    for (let s = 1; s <= ex.sets; s++) {
      const v = getSet(split, ex.name, week, s);
      if (v.kg && v.reps) { hasSets = true; break; }
    }
    if (hasSets) filled++;
  }
  return filled;
}

// ── RPT Helpers ──────────────────────────────────────────────────────────
function rptDropWeight(kg, setIndex) {
  // Each subsequent set drops ~10%
  return Math.round(kg * Math.pow(0.9, setIndex) * 2) / 2; // round to 0.5
}

function getSmartPlaceholder(split, ex, setNum) {
  // For RPT: cascade from Set 1 weight with 10% drops
  // For Kino: use Set 1 weight for all sets
  if (ex.method === 'rpt' && setNum > 1) {
    // Check if Set 1 has kg this week
    const s1 = getSet(split, ex.name, currentWeek, 1);
    const s1kg = parseFloat(s1.kg) || 0;
    if (s1kg > 0) {
      return rptDropWeight(s1kg, setNum - 1);
    }
    // Check previous set this week
    const prev = getSet(split, ex.name, currentWeek, setNum - 1);
    const prevKg = parseFloat(prev.kg) || 0;
    if (prevKg > 0) return rptDropWeight(prevKg, 1);
  }

  if (ex.method === 'kino' && setNum > 1) {
    // Same weight across all sets — show Set 1 weight
    const s1 = getSet(split, ex.name, currentWeek, 1);
    if (parseFloat(s1.kg) > 0) return s1.kg;
  }

  // Fallback: previous week's same set
  if (currentWeek > 1) {
    const pv = getSet(split, ex.name, currentWeek - 1, setNum);
    if (pv.kg) return pv.kg;
  }
  return '—';
}

      ${extraStat}
    `;
    return;
  }

  const vol = getTotalVol(currentWeek);
  const prevVol = currentWeek > 1 ? getTotalVol(currentWeek - 1) : 0;
  const delta = prevVol ? ((vol - prevVol) / prevVol * 100).toFixed(1) : 0;

  let filled = 0, total = 0;
  if (currentTab !== 'nutrition') {
    total = EXERCISES[currentTab].length;

  }

  let prs = 0;
  for (const split of ['push','pull','leg']) {
    for (const ex of EXERCISES[split]) {
      let maxV = 0;
      for (let w = 1; w <= WEEKS; w++) maxV = Math.max(maxV, getExerciseVolume(split, ex.name, w));
      const cv = getExerciseVolume(split, ex.name, currentWeek);
      if (cv > 0 && cv >= maxV) prs++;

  const goalBadge = { cut: '🔥 CUT', maintain: '⚖️ HOLD', bulk: '💪 BULK' }[currentGoal];

  row.innerHTML = `

      <div class="stat-value">${vol ? vol.toLocaleString() : '—'} <span class="stat-unit">kg</span></div>
      ${prevVol && vol ? `<div class="stat-delta ${delta > 0 ? 'up' : delta < 0 ? 'down' : 'same'}">${delta > 0 ? '+' : ''}${delta}% vs W${currentWeek - 1}</div>` : ''}

function renderExercises(split) {
  const exercises = EXERCISES[split];
  let html = '<div class="exercise-list">';

  for (const ex of exercises) {
    const vol = getExerciseVolume(split, ex.name, currentWeek);
    const prevVol = currentWeek > 1 ? getExerciseVolume(split, ex.name, currentWeek - 1) : 0;
    const status = getExProgress(split, ex.name, currentWeek);
    const pctChange = prevVol > 0 ? ((vol - prevVol) / prevVol * 100).toFixed(0) : null;
    const hasData = vol > 0;

    let maxVol = 0;
    for (let w = 1; w <= WEEKS; w++) maxVol = Math.max(maxVol, getExerciseVolume(split, ex.name, w));
    const barPct = maxVol > 0 ? Math.round(vol / maxVol * 100) : 0;
    const barColor = status === 'up' ? 'var(--green)' : status === 'down' ? 'var(--red)' : status === 'same' ? 'var(--yellow)' : 'var(--accent)';

    const statusLabel = { up: '+' + pctChange + '%', down: pctChange + '%', same: '0%', none: '—' }[status];

    // Method info
    const methodLabel = ex.method === 'rpt' ? 'RPT' : 'KINO';
    const methodCls = ex.method;

    // Meta text
    const metaTarget = ex.method === 'rpt'
      ? ex.targets.join(', ') + ' reps'
      : ex.targets[0] + ' reps';
    const restTime = ex.method === 'rpt' ? '3 min rest' : '2 min rest';

    html += `
      <div class="exercise-card ${hasData ? 'has-data' : ''}">
        <div class="exercise-card-header">
          <div>
            <div class="exercise-name">
              ${ex.name}
              <span class="method-badge ${methodCls}">${methodLabel}</span>
            </div>
            <div class="exercise-meta">${ex.sets} sets &middot; ${metaTarget} &middot; ${restTime}</div>
          </div>
          <span class="exercise-badge ${status}">${statusLabel}</span>
        </div>
        <div class="sets-container">
          <div class="set-header">
            <span>Set</span><span>KG</span><span>Reps</span>
          </div>`;

    for (let s = 1; s <= ex.sets; s++) {
      const sv = getSet(split, ex.name, currentWeek, s);
      const prevSv = currentWeek > 1 ? getSet(split, ex.name, currentWeek - 1, s) : { kg: '', reps: '' };
      const kgFilled = sv.kg ? 'filled' : '';
      const repsFilled = sv.reps ? 'filled' : '';

      // Smart placeholder for kg
      const kgPlaceholder = getSmartPlaceholder(split, ex, s);
      const repsPlaceholder = prevSv.reps || '—';

      // Set label with target
      const setTarget = ex.targets[s - 1] || '';
      const isHeavy = ex.method === 'rpt' && s === 1;

      html += `
          <div class="set-row">
            <div class="set-label ${isHeavy ? 'heavy' : ''}">
              S${s}${isHeavy ? ' ⚡' : ''}
              <span class="set-target-hint">${setTarget}</span>
            </div>
            <input class="set-input ${kgFilled}" type="number" inputmode="decimal" placeholder="${kgPlaceholder}"
              value="${sv.kg}"
              onchange="setSetVal('${split}','${ex.name}',${currentWeek},${s},'kg',this.value);renderContent()"
              onfocus="this.select()">
            <input class="set-input ${repsFilled}" type="number" inputmode="numeric" placeholder="${repsPlaceholder}"
              value="${sv.reps}"
              onchange="setSetVal('${split}','${ex.name}',${currentWeek},${s},'reps',this.value);renderContent()"
              onfocus="this.select()">
          </div>`;
    }

    html += `</div>`;

    if (prevVol > 0) {
      html += `<div class="exercise-prev">
        <span class="prev-label">Last week total vol: </span>
        <span class="prev-value">${prevVol.toLocaleString()} kg</span>
      </div>`;
    }

    html += `<div class="card-progress-bar"><div class="card-progress-fill" style="width:${barPct}%;background:${barColor}"></div></div></div>`;
  }
  html += '</div>';
  return html;
}

function renderNutrition() {
  const targets = getMacroTargets();
  let html = '<div class="macro-summary">';
  for (const macro of MACROS) {
    let total = 0, count = 0;
    for (const day of DAYS) {
      const v = parseFloat(getNutr(currentWeek, macro, day)) || 0;
      if (v > 0) { total += v; count++; }
    }
    const avg = count > 0 ? Math.round(total / count) : 0;
    const target = targets[macro];
    const pct = target ? Math.min(100, Math.round(avg / target * 100)) : 0;
    html += `
      <div class="macro-card">
        <div class="macro-card-label">${MACRO_SHORT[macro]}</div>
        <div class="macro-card-value" style="color:${MACRO_COLORS[macro]}">${avg || '—'}</div>
        <div class="macro-card-target">/ ${target}${macro === 'Calories' ? '' : 'g'} (${currentGoal})</div>
        <div class="macro-bar"><div class="macro-bar-fill" style="width:${pct}%;background:${MACRO_COLORS[macro]}"></div></div>
      </div>`;
  }
  html += '</div>';

  for (const day of DAYS) {
    html += `<div class="nutrition-day-card"><div class="nutrition-day-header">${day}</div><div class="nutrition-day-inputs">`;
    for (const macro of MACROS) {
      const val = getNutr(currentWeek, macro, day);
      html += `<div class="nutrition-input-group">

          onchange="setNutr(${currentWeek},'${macro}','${day}',this.value);renderContent()">

    }
    html += '</div></div>';
  }
  return html;
}

      background:${active ? 'rgba(0,185,229,0.12)' : 'var(--surface)'};
      color:${active ? '#00b9e5' : 'var(--text-muted)'};transition:all 0.2s;
    ">${t.label}${t.count !== null ? ' ('+t.count+')' : ''}</button>`;
  }
  html += '</div>';

  if (garminSubTab === 'strength') {
    html += '<div class="garmin-list">';
    for (const s of GARMIN_STRENGTH) {
      const d = new Date(s.date);
      const formatted = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      html += `
        <div class="garmin-card">
          <div>
            <div class="garmin-date">${formatted}</div>
            <div class="garmin-day">${s.day}</div>
          </div>
          <div class="garmin-stats">
            <div><div class="garmin-stat-val">${s.dur_min}m</div><div class="garmin-stat-label">Duration</div></div>
            <div><div class="garmin-stat-val">${s.cal.toLocaleString()}</div><div class="garmin-stat-label">Calories</div></div>
          </div>
        </div>`;
    }
    html += '</div>';

  } else if (garminSubTab === 'jumprope') {
    html += '<div class="garmin-list">';
    for (const s of GARMIN_JUMPROPE) {
      const d = new Date(s.date);
      const formatted = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      html += `
        <div class="garmin-card">
          <div>
            <div class="garmin-date">${formatted}</div>
            <div class="garmin-day">${s.day}</div>
          </div>
          <div class="garmin-stats">
            <div><div class="garmin-stat-val">${s.dur_min}m</div><div class="garmin-stat-label">Duration</div></div>
            <div><div class="garmin-stat-val">${s.cal.toLocaleString()}</div><div class="garmin-stat-label">Cal</div></div>
            <div><div class="garmin-stat-val" style="color:var(--red)">${s.avgHr}</div><div class="garmin-stat-label">Avg HR</div></div>
          </div>
        </div>`;
    }
    html += '</div>';

  } else if (garminSubTab === 'steps') {
    const r = GARMIN_STEP_RECORDS;
    html += `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <div class="stat-card featured" style="grid-column:1/-1">
          <div class="stat-label">Best Day</div>
          <div class="stat-value">${r.bestDay.value.toLocaleString()} <span class="stat-unit">steps</span></div>
          <div style="font-size:10px;color:var(--text-muted)">${new Date(r.bestDay.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Best Week</div>
          <div class="stat-value" style="font-size:20px">${r.bestWeek.value.toLocaleString()}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Best Month</div>
          <div class="stat-value" style="font-size:20px">${r.bestMonth.value.toLocaleString()}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Longest Streak</div>
          <div class="stat-value">${r.longestStreak} <span class="stat-unit">days</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Daily Avg (Best Month)</div>
          <div class="stat-value" style="font-size:20px">${Math.round(r.bestMonth.value / 30).toLocaleString()}</div>
        </div>
      </div>
      <div style="padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text-muted);line-height:1.5">
        <strong style="color:var(--text)">Garmin Sync:</strong> Garmin's API requires OAuth partner access, so live daily step data can't be pulled automatically. You can periodically export from Garmin Connect and re-import here. Your jump rope and strength sessions are already tracked above.
      </div>`;
  }

  html += '</div>';
  return html;
}

function renderContent() {
  const el = document.getElementById('tabContent');
  if (currentTab === 'nutrition') el.innerHTML = renderNutrition();
  else if (currentTab === 'garmin') el.innerHTML = renderGarmin();
  else el.innerHTML = renderExercises(currentTab);
}

function renderChart() {
  const section = document.getElementById('chartSection');
  if (currentTab === 'garmin') { section.style.display = 'none'; return; }
  section.style.display = 'block';

  const canvas = document.getElementById('volumeChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = (rect.width - 24) * dpr;
  canvas.height = 200 * dpr;
  canvas.style.width = (rect.width - 24) + 'px';
  canvas.style.height = '200px';
  ctx.scale(dpr, dpr);

  const W = rect.width - 24, H = 200;
  ctx.clearRect(0, 0, W, H);

  const pad = { top: 20, right: 10, bottom: 30, left: 44 };
  const w = W - pad.left - pad.right, h = H - pad.top - pad.bottom;

  const vols = [];
  for (let i = 1; i <= WEEKS; i++) vols.push(getTotalVol(i));
  const maxVol = Math.max(...vols, 1);

  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (h / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
    ctx.fillStyle = 'rgba(229,226,225,0.25)';
    ctx.font = '9px Cabinet Grotesk, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVol - (maxVol / 3) * i).toLocaleString(), pad.left - 6, y + 3);
  }

  ctx.fillStyle = 'rgba(229,226,225,0.3)';
  ctx.textAlign = 'center';
  for (let i = 0; i < WEEKS; i++) {
    ctx.fillText(i + 1, pad.left + (w / (WEEKS - 1)) * i, H - 8);
  }

  const pts = [];
  for (let i = 0; i < WEEKS; i++) {
    pts.push({ x: pad.left + (w / (WEEKS - 1)) * i, y: pad.top + h - (vols[i] / maxVol) * h, v: vols[i] });
  }

  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, 'rgba(255,95,0,0.12)'); grad.addColorStop(1, 'rgba(255,95,0,0.0)');
  ctx.beginPath(); ctx.moveTo(pts[0].x, pad.top + h);
  for (const p of pts) ctx.lineTo(p.x, p.y);
  ctx.lineTo(pts[pts.length - 1].x, pad.top + h); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = '#FF5F00'; ctx.lineWidth = 2; ctx.stroke();

  for (let i = 0; i < pts.length; i++) {
    if (pts[i].v > 0) {
      const cur = i + 1 === currentWeek;
      ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, cur ? 5 : 3, 0, Math.PI * 2);
      ctx.fillStyle = cur ? '#FF5F00' : 'rgba(255,95,0,0.5)'; ctx.fill();
      if (cur) { ctx.strokeStyle = 'rgba(255,95,0,0.25)'; ctx.lineWidth = 6; ctx.stroke(); }
    }
  }
}

// ── Coach (Greek God 2.0 RPT Logic) ─────────────────────────────────────
function renderCoach() {
  const box = document.getElementById('coachBox');
  if (currentTab === 'nutrition' || currentTab === 'garmin') { box.innerHTML = ''; return; }

  const split = currentTab;
  const exercises = EXERCISES[split];
  const goal = currentGoal;
  let recs = [];
  let warmupHtml = '';

  // Find the first RPT exercise with data for warmup guidance
  let firstRptEx = null;
  for (const ex of exercises) {
    if (ex.method === 'rpt') { firstRptEx = ex; break; }
  }

  for (let ei = 0; ei < exercises.length; ei++) {
    const ex = exercises[ei];

    if (ex.method === 'rpt') {
      // ── RPT LOGIC ─────────────────────────────────────────
      // Progression is based on Set 1 (heavy set)
      const set1 = getSet(split, ex.name, currentWeek, 1);
      const s1kg = parseFloat(set1.kg) || 0;
      const s1reps = parseFloat(set1.reps) || 0;
      const [s1min, s1max] = ex.targets[0].split('-').map(Number);

      const isLeg = split === 'leg';
      const increment = isLeg ? 5 : 2.5;

      if (s1kg === 0) {
        // No data this week — find most recent Set 1 data
        let prevKg = 0, prevReps = 0;
        for (let w = currentWeek - 1; w >= 1; w--) {
          const pv = getSet(split, ex.name, w, 1);
          if (parseFloat(pv.kg) > 0) { prevKg = parseFloat(pv.kg); prevReps = parseFloat(pv.reps) || 0; break; }
        }
        if (prevKg > 0) {
          // Build set plan from previous data
          let setPlan = '';
          for (let s = 1; s <= ex.sets; s++) {
            const tKg = rptDropWeight(prevKg, s - 1);
            const tRange = ex.targets[s - 1];
            setPlan += `<span class="csp-label">S${s}${s===1?' ⚡':''}</span><span class="csp-kg">${tKg} kg</span><span class="csp-reps">${tRange} reps</span>`;
          }
          recs.push({
            name: ex.name, method: 'RPT',
            rec: `Match last session — heavy set at <span class="coach-accent">${prevKg} kg</span>.`,
            setPlan: setPlan
          });

          // Warmup for first RPT exercise
          if (ex === firstRptEx && !warmupHtml) {
            const w60 = Math.round(prevKg * 0.6 * 2) / 2;
            const w75 = Math.round(prevKg * 0.75 * 2) / 2;
            const w90 = Math.round(prevKg * 0.9 * 2) / 2;
            warmupHtml = `
              <div class="coach-warmup">
                <strong>Warmup — ${ex.name}</strong><br>
                <span class="warmup-weight">${w60} kg</span> x 5 reps (60%) &rarr;
                <span class="warmup-weight">${w75} kg</span> x 3 reps (75%) &rarr;
                <span class="warmup-weight">${w90} kg</span> x 1 rep (90%)<br>
                Rest 3 min, then begin heavy set
              </div>`;
          }
        }
        continue;
      }

      // Warmup for first RPT exercise (with current data)
      if (ex === firstRptEx && !warmupHtml) {
        const w60 = Math.round(s1kg * 0.6 * 2) / 2;
        const w75 = Math.round(s1kg * 0.75 * 2) / 2;
        const w90 = Math.round(s1kg * 0.9 * 2) / 2;
        warmupHtml = `
          <div class="coach-warmup">
            <strong>Warmup — ${ex.name}</strong><br>
            <span class="warmup-weight">${w60} kg</span> x 5 reps (60%) &rarr;
            <span class="warmup-weight">${w75} kg</span> x 3 reps (75%) &rarr;
            <span class="warmup-weight">${w90} kg</span> x 1 rep (90%)<br>
            Rest 3 min, then begin heavy set
          </div>`;
      }

      // Check previous week's Set 1 performance
      let prevS1Kg = 0, prevS1Reps = 0;
      if (currentWeek > 1) {
        const ps1 = getSet(split, ex.name, currentWeek - 1, 1);
        prevS1Kg = parseFloat(ps1.kg) || 0;
        prevS1Reps = parseFloat(ps1.reps) || 0;
      }
      const prevHitTop = prevS1Reps >= s1max && prevS1Kg > 0;

      let rec = '', nextKg = s1kg;

      if (s1reps >= s1max) {
        // HIT TOP OF RANGE on heavy set
        if (goal === 'cut') {
          // Conservative on a cut — maintain strength
          if (prevHitTop) {
            rec = `Hit ${s1reps} reps at ${s1kg} kg two weeks running. On a cut, you're <span class="coach-highlight">crushing it</span>. Repeat <span class="coach-accent">${s1kg} kg</span> — only go up if it feels easy.`;
          } else {
            rec = `Hit top of range (${s1reps} reps) — excellent strength retention on a cut. Repeat <span class="coach-accent">${s1kg} kg</span> next session.`;
          }
        } else if (goal === 'bulk') {
          // Aggressive — increase immediately
          nextKg = s1kg + increment;
          rec = `Smashed ${s1reps} reps at ${s1kg} kg. <span class="coach-highlight">Increase to ${nextKg} kg</span> next session, target ${s1min} reps. You have the fuel — push it.`;
        } else {
          // Maintain — standard RPT progression (2 weeks rule)
          if (prevHitTop) {
            nextKg = s1kg + increment;
            rec = `Hit ${s1max} reps 2 weeks in a row. <span class="coach-highlight">Increase to ${nextKg} kg</span> next session, target ${s1min} reps.`;
          } else {
            rec = `Hit top of range (${s1reps}). Repeat <span class="coach-accent">${s1kg} kg</span> — if you hit ${s1max} again next week, go up to <span class="coach-highlight">${s1kg + increment} kg</span>.`;
          }
        }
      } else if (s1reps >= s1min) {
        // IN RANGE — push for more reps
        if (goal === 'cut') {
          rec = `${s1kg} kg x ${s1reps} — <span class="coach-highlight">solid on a cut</span>. Maintain this weight. Push for ${Math.min(s1reps + 1, s1max)} reps if energy allows.`;
        } else {
          rec = `${s1kg} kg x ${s1reps} — in range. <span class="coach-warn">Push for ${Math.min(s1reps + 1, s1max)} reps</span> next time at same weight.`;
        }
      } else {
        // BELOW RANGE
        if (goal === 'cut') {
          rec = `${s1reps} reps at ${s1kg} kg — below target (${s1min}-${s1max}). <span class="coach-warn">Normal on a cut.</span> Consider <span class="coach-accent">${s1kg - increment} kg</span> if this persists 2+ weeks.`;
        } else {
          rec = `Only ${s1reps} reps at ${s1kg} kg (target ${s1min}+). <span class="coach-warn">Stay at ${s1kg} kg</span> until you hit ${s1min}+ reps.`;
        }
      }

      // Build set plan for next session
      let setPlan = '';
      for (let s = 1; s <= ex.sets; s++) {
        const tKg = rptDropWeight(nextKg, s - 1);
        const tRange = ex.targets[s - 1];
        setPlan += `<span class="csp-label">S${s}${s===1?' ⚡':''}</span><span class="csp-kg">${tKg} kg</span><span class="csp-reps">${tRange} reps</span>`;
      }

      recs.push({ name: ex.name, method: 'RPT', rec, setPlan });

    } else if (ex.method === 'kino') {
      // ── KINO REP LOGIC ────────────────────────────────────
      // Same weight across all sets. Progress when ALL sets hit top of range.
      const [minRep, maxRep] = ex.targets[0].split('-').map(Number);
      let allHitTop = true, anyData = false, kgUsed = 0, lowestReps = Infinity, filledSets = 0;

      for (let s = 1; s <= ex.sets; s++) {
        const sv = getSet(split, ex.name, currentWeek, s);
        const kg = parseFloat(sv.kg) || 0;
        const reps = parseFloat(sv.reps) || 0;
        if (kg > 0 && reps > 0) {
          anyData = true; filledSets++;
          kgUsed = Math.max(kgUsed, kg);
          lowestReps = Math.min(lowestReps, reps);
          if (reps < maxRep) allHitTop = false;
        }
      }

      const isLeg = split === 'leg';
      const increment = isLeg ? 5 : 2.5;

      if (!anyData) {
        // No data — check previous weeks
        let prevKg = 0;
        for (let w = currentWeek - 1; w >= 1; w--) {
          const pv = getSet(split, ex.name, w, 1);
          if (parseFloat(pv.kg) > 0) { prevKg = parseFloat(pv.kg); break; }
        }
        if (prevKg > 0) {
          recs.push({
            name: ex.name, method: 'KINO',
            rec: `Use <span class="coach-accent">${prevKg} kg</span> across all ${ex.sets} sets, aim for ${minRep}-${maxRep} reps.`
          });
        }
        continue;
      }

      let rec = '';
      if (allHitTop && filledSets === ex.sets) {
        if (goal === 'cut') {
          rec = `All sets at ${maxRep} reps with ${kgUsed} kg — <span class="coach-highlight">great strength retention</span>. Maintain this weight.`;
        } else if (goal === 'bulk') {
          const newKg = kgUsed + increment;
          rec = `Maxed out all ${ex.sets} sets. <span class="coach-highlight">Increase to ${newKg} kg</span> next session, target ${minRep} reps across all sets.`;
        } else {
          // Check if hit top 2 weeks running
          let prevAllHit = true;
          if (currentWeek > 1) {
            for (let s = 1; s <= ex.sets; s++) {
              const pv = getSet(split, ex.name, currentWeek - 1, s);
              if ((parseFloat(pv.reps) || 0) < maxRep) { prevAllHit = false; break; }
            }
          } else { prevAllHit = false; }

          if (prevAllHit) {
            const newKg = kgUsed + increment;
            rec = `Hit ${maxRep} reps on all sets 2 weeks running. <span class="coach-highlight">Increase to ${newKg} kg</span>, target ${minRep} reps.`;
          } else {
            rec = `All sets at ${maxRep} reps. Repeat <span class="coach-accent">${kgUsed} kg</span> — if you hit ${maxRep} again, go up to ${kgUsed + increment} kg.`;
          }
        }
      } else if (lowestReps >= minRep) {
        rec = `${kgUsed} kg — lowest set at ${lowestReps} reps. Keep pushing to hit ${maxRep} on <span class="coach-warn">all ${ex.sets} sets</span> before increasing.`;
      } else {
        if (goal === 'cut') {
          rec = `Some sets below ${minRep} reps at ${kgUsed} kg. On a cut, consider <span class="coach-warn">dropping to ${kgUsed - increment} kg</span> to stay in range.`;
        } else {
          rec = `Below target range — ${lowestReps} reps at ${kgUsed} kg (need ${minRep}+). <span class="coach-warn">Stay at ${kgUsed} kg</span> until all sets hit ${minRep}+.`;
        }
      }

      recs.push({ name: ex.name, method: 'KINO', rec });
    }
  }

  // ── Build the coach box HTML ───────────────────────────────
  if (recs.length === 0 && !warmupHtml) {
    box.innerHTML = `
      <div class="coach-box">
        <div class="coach-header">
          <div class="coach-icon">&#9889;</div>
          <div class="coach-title">Next Session — Greek God RPT</div>
        </div>
        <div class="coach-empty">Log your exercises above and I'll generate your next session playbook — when to increase weight, what RPT drop sets to hit, and warmup weights.</div>
      </div>`;
    return;
  }

  // Goal-specific coaching note
  const goalNotes = {
    cut: `<strong>CUT MODE</strong> — Strength maintenance is the priority. A 5-10% strength drop is normal in a deficit. Keep protein at 240g+, hit 10,000+ steps/day, and do 1-3 jump rope sessions/week.`,
    maintain: `<strong>MAINTENANCE</strong> — Standard Greek God RPT progression. Hit the top of your rep range 2 weeks running, then increase weight. Rest 3 min between RPT sets.`,
    bulk: `<strong>BULK MODE</strong> — Push for PRs. You have the caloric surplus to recover. Increase weight as soon as you hit the top of your rep range. Eat big, lift big.`,
  };

  let coachHtml = `
    <div class="coach-box">
      <div class="coach-header">
        <div class="coach-icon">&#9889;</div>
        <div class="coach-title">Next Session — Week ${currentWeek + 1 <= WEEKS ? currentWeek + 1 : currentWeek}</div>
      </div>
      <div class="coach-goal-note ${goal}">${goalNotes[goal]}</div>
      ${warmupHtml}`;

  for (const r of recs) {
    coachHtml += `
      <div class="coach-item">
        <div class="coach-exercise">
          <span class="method-badge ${r.method === 'RPT' ? 'rpt' : 'kino'}">${r.method}</span>
          ${r.name}
        </div>
        <div class="coach-rec">${r.rec}</div>
        ${r.setPlan ? `<div class="coach-set-plan">${r.setPlan}</div>` : ''}
      </div>`;
  }

  coachHtml += '</div>';
  box.innerHTML = coachHtml;
}

function render() {
  renderGoalBar(); renderBottomNav(); renderDesktopTabs(); renderWeekScroll();
  renderStats(); renderContent(); renderChart(); renderCoach();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'gym-tracker-export.json'; a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try { data = JSON.parse(ev.target.result); saveData(); render(); }
      catch { alert('Invalid file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

currentWeek = Math.max(1, ...Array.from(getFilledWeeks()));
if (!getFilledWeeks().size) currentWeek = 1;
render();
window.addEventListener('resize', renderChart);
</script>
