<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#131313">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Gym Tracker — Curve</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@300,400,500,700,800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #131313;
  --surface:      #1c1b1b;
  --surface2:     #201f1f;
  --border:       rgba(255,255,255,0.09);
  --border-soft:  rgba(255,255,255,0.04);
  --accent:       #FF5F00;
  --accent-dim:   rgba(255,95,0,0.10);
  --accent-glow:  rgba(255,95,0,0.20);
  --accent-border:rgba(255,95,0,0.30);
  --text:         #E5E2E1;
  --text-muted:   rgba(229,226,225,0.45);
  --text-faint:   rgba(229,226,225,0.15);
  --green:        #22c55e;
  --yellow:       #eab308;
  --red:          #ef4444;
  --blue:         #3b82f6;
  --purple:       #a855f7;
  --font:         'Cabinet Grotesk', 'DM Sans', system-ui, sans-serif;
  --radius:       10px;
  --radius-sm:    6px;
  --safe-bottom:  env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
}
::-webkit-scrollbar { display: none; }
body { overflow-x: hidden; }
.app { min-height: 100vh; display: flex; flex-direction: column; position: relative; }

.ambient-glow {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 90% 50% at 50% 100%, rgba(255,95,0,0.07) 0%, rgba(180,50,3,0.03) 40%, transparent 70%);
  animation: glowBreathe 10s ease-in-out infinite;
}
@keyframes glowBreathe { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

/* ── Header ────────────────────────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 56px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; position: sticky; top: 0; z-index: 20;
  background: rgba(19,19,19,0.92); backdrop-filter: blur(20px);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-wordmark {
  font-size: 32px; font-weight: 800; letter-spacing: -0.04em;
  text-transform: lowercase; color: var(--text); line-height: 0.85;
}
.logo-divider { width: 1px; height: 22px; background: var(--border); }
.logo-sub {
  font-size: 9px; font-weight: 600; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-muted);
}
.header-actions { display: flex; gap: 8px; }
.btn-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all 0.2s;
}
.btn-icon:active { transform: scale(0.92); background: var(--surface2); }

/* ── Goal selector ────────────────────────────────────────────── */
.goal-bar {
  display: flex; gap: 6px; padding: 10px 14px;
  background: rgba(19,19,19,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 56px; z-index: 19;
}
.goal-chip {
  flex: 1; padding: 8px 10px; border-radius: 8px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); font-family: var(--font);
  font-size: 10px; font-weight: 700; text-align: center;
  cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  letter-spacing: 0.1em; line-height: 1.1;
}
.goal-chip:active { transform: scale(0.96); }
.goal-chip .goal-sub { font-size: 8px; font-weight: 500; letter-spacing: 0.06em; margin-top: 2px; display: block; opacity: 0.7; }
.goal-chip.cut.active { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); color: var(--red); }
.goal-chip.maintain.active { background: rgba(234,179,8,0.12); border-color: rgba(234,179,8,0.35); color: var(--yellow); }
.goal-chip.bulk.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.35); color: var(--green); }

/* ── Main ──────────────────────────────────────────────────────── */
.main {
  flex: 1; overflow-y: auto; padding: 16px 14px calc(80px + var(--safe-bottom));
  position: relative; z-index: 5; -webkit-overflow-scrolling: touch;
}

/* ── Stats ─────────────────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 14px 12px;
  display: flex; flex-direction: column; gap: 3px;
}
.stat-card.featured { grid-column: 1 / -1; background: rgba(255,95,0,0.05); border-color: var(--accent-border); }
.stat-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); }
.stat-value { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.stat-unit { font-size: 12px; color: var(--text-muted); font-weight: 500; }
.stat-delta { font-size: 11px; font-weight: 600; }
.stat-delta.up { color: var(--green); }
.stat-delta.down { color: var(--red); }
.stat-delta.same { color: var(--yellow); }

/* ── Week chips ────────────────────────────────────────────────── */
.week-scroll {
  display: flex; gap: 6px; overflow-x: auto; padding: 0 0 14px;
  margin-bottom: 14px; -webkit-overflow-scrolling: touch;
}
.week-scroll::-webkit-scrollbar { display: none; }
.week-chip {
  flex-shrink: 0; padding: 7px 14px; border-radius: 16px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-muted); font-family: var(--font);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.week-chip:active { transform: scale(0.95); }
.week-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.week-chip.has-data { border-color: rgba(34,197,94,0.3); }

/* ── Exercise cards ────────────────────────────────────────────── */
.exercise-list { display: flex; flex-direction: column; gap: 10px; }
.exercise-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s;
}
.exercise-card.has-data { border-color: rgba(34,197,94,0.15); }

.exercise-card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 16px 10px;
}
.exercise-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.2; display: flex; align-items: center; gap: 7px; }
.exercise-meta { font-size: 10px; font-weight: 500; color: var(--text-muted); margin-top: 3px; }

.method-badge {
  padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 800;
  letter-spacing: 0.1em; flex-shrink: 0;
}
.method-badge.rpt { background: rgba(255,95,0,0.12); color: var(--accent); }
.method-badge.kino { background: rgba(59,130,246,0.12); color: var(--blue); }

.unit-toggle {
  padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 800;
  letter-spacing: 0.1em; flex-shrink: 0; cursor: pointer;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-muted); font-family: var(--font);
  transition: all 0.15s;
}
.unit-toggle:active { transform: scale(0.92); }
.unit-toggle.lbs { background: rgba(168,85,247,0.12); border-color: rgba(168,85,247,0.25); color: var(--purple); }

.exercise-badge {
  padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; white-space: nowrap;
}
.exercise-badge.up { background: rgba(34,197,94,0.12); color: var(--green); }
.exercise-badge.down { background: rgba(239,68,68,0.12); color: var(--red); }
.exercise-badge.same { background: rgba(234,179,8,0.12); color: var(--yellow); }
.exercise-badge.none { background: rgba(255,255,255,0.04); color: var(--text-faint); }

/* ── Set rows ──────────────────────────────────────────────────── */
.sets-container { padding: 0 16px 14px; }

.set-row {
  display: grid; grid-template-columns: 50px 1fr 1fr; gap: 8px;
  align-items: center; padding: 6px 0;
  border-bottom: 1px solid var(--border-soft);
}
.set-row:last-child { border-bottom: none; }

.set-label {
  font-size: 10px; font-weight: 700; color: var(--text-muted);
  text-align: center; line-height: 1.2;
}
.set-label .set-target-hint {
  display: block; font-size: 8px; font-weight: 600; color: var(--text-faint);
  margin-top: 1px;
}
.set-label.heavy { color: var(--accent); }

.set-header {
  display: grid; grid-template-columns: 50px 1fr 1fr; gap: 8px;
  padding: 0 0 6px; margin-bottom: 2px; border-bottom: 1px solid var(--border);
}
.set-header span {
  font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-faint); text-align: center;
}

.set-input {
  background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: var(--text); font-family: var(--font);
  font-size: 16px; font-weight: 600; text-align: center;
  padding: 10px 6px; outline: none; width: 100%;
  -webkit-appearance: none; -moz-appearance: textfield;
  transition: border-color 0.2s, background 0.2s;
}
.set-input:focus { border-color: rgba(255,95,0,0.5); background: rgba(255,95,0,0.05); }
.set-input::placeholder { color: var(--text-faint); font-weight: 400; }
.set-input.filled { border-color: rgba(34,197,94,0.2); }

.exercise-prev {
  display: flex; gap: 10px; padding: 8px 16px;
  background: rgba(255,255,255,0.015); border-top: 1px solid var(--border-soft);
  font-size: 10.5px; color: var(--text-muted);
}
.prev-label { font-weight: 500; }
.prev-value { font-weight: 600; color: var(--text); }

.card-progress-bar {
  height: 3px; background: rgba(255,255,255,0.04); overflow: hidden;
}
.card-progress-fill {
  height: 100%; transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
}

/* ── Nutrition ─────────────────────────────────────────────────── */
.macro-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.macro-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
}
.macro-card-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2px; }
.macro-card-value { font-size: 22px; font-weight: 700; line-height: 1.1; }
.macro-card-target { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.macro-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.macro-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

.nutrition-day-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
}
.nutrition-day-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); margin-bottom: 10px; }
.nutrition-day-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.nutrition-input-group { display: flex; flex-direction: column; gap: 3px; }
.nutrition-input-label { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
.nutrition-input {
  background: rgba(255,255,255,0.04); border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: var(--text); font-family: var(--font);
  font-size: 16px; font-weight: 600; text-align: center;
  padding: 10px 8px; outline: none; width: 100%; -webkit-appearance: none;
}
.nutrition-input:focus { border-color: rgba(255,95,0,0.5); background: rgba(255,95,0,0.05); }

/* ── Garmin sessions ───────────────────────────────────────────── */
.garmin-section { margin-top: 20px; }
.section-title {
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.garmin-badge {
  padding: 2px 7px; border-radius: 8px; font-size: 9px; font-weight: 700;
  background: rgba(0,185,229,0.12); color: #00b9e5; letter-spacing: 0.06em;
}

.garmin-list { display: flex; flex-direction: column; gap: 6px; }
.garmin-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.garmin-date { font-size: 13px; font-weight: 600; }
.garmin-day { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.garmin-stats { display: flex; gap: 14px; text-align: right; }
.garmin-stat-val { font-size: 14px; font-weight: 700; }
.garmin-stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

/* ── Chart ─────────────────────────────────────────────────────── */
.chart-section { margin-top: 20px; }
.chart-container {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 12px; position: relative; overflow: hidden;
}
.chart-container canvas { width: 100% !important; height: 200px !important; }
.chart-glow {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 70%; height: 80px; border-radius: 50%;
  background: radial-gradient(ellipse, rgba(255,95,0,0.08), transparent 70%);
  pointer-events: none; filter: blur(20px);
}

/* ── Bottom nav ────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(68px + var(--safe-bottom)); padding-bottom: var(--safe-bottom);
  background: rgba(19,19,19,0.95); backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around; align-items: center; z-index: 20;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; color: var(--text-muted);
  font-family: var(--font); font-size: 9px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 8px 12px; cursor: pointer; transition: color 0.2s; position: relative;
}
.nav-btn.active { color: var(--accent); }
.nav-btn.active::after {
  content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
  width: 24px; height: 2px; background: var(--accent); border-radius: 1px;
}
.nav-icon { font-size: 16px; }

/* ── Coach box ─────────────────────────────────────────────────── */
.coach-box {
  background: var(--surface); border: 1px solid var(--accent-border);
  border-radius: var(--radius); padding: 16px 18px; margin-top: 20px;
  position: relative; overflow: hidden;
}
.coach-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), rgba(255,95,0,0.2));
}
.coach-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}
.coach-icon {
  width: 28px; height: 28px; border-radius: 7px;
  background: rgba(255,95,0,0.1); border: 0.5px solid rgba(255,95,0,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.coach-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent);
}

.coach-warmup {
  padding: 10px 12px; border-radius: 8px; margin-bottom: 14px;
  background: rgba(168,85,247,0.06); border: 1px solid rgba(168,85,247,0.15);
  font-size: 11px; line-height: 1.5; color: var(--text-muted);
}
.coach-warmup strong { color: var(--purple); font-weight: 700; }
.coach-warmup .wu { color: var(--text); font-weight: 600; }

.coach-empty {
  font-size: 12px; color: var(--text-muted); padding: 8px 0; line-height: 1.5;
}

.coach-ex-row {
  padding: 10px 0; border-bottom: 1px solid var(--border-soft);
}
.coach-ex-row:last-child { border-bottom: none; padding-bottom: 0; }
.coach-ex-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.coach-ex-name { font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }
.coach-directive {
  padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0;
}
.coach-directive.hold { background: rgba(234,179,8,0.12); color: var(--yellow); }
.coach-directive.up { background: rgba(34,197,94,0.12); color: var(--green); }
.coach-directive.drop { background: rgba(239,68,68,0.12); color: var(--red); }
.coach-directive.new-ex { background: rgba(255,255,255,0.06); color: var(--text-muted); }

.coach-plan {
  display: grid; grid-template-columns: 44px 1fr 1fr; gap: 2px 8px;
  font-size: 12px; padding: 8px 10px;
  background: rgba(255,255,255,0.02); border-radius: 6px;
}
.coach-plan .cp-set { color: var(--text-muted); font-weight: 700; font-size: 11px; padding: 3px 0; }
.coach-plan .cp-set.heavy { color: var(--accent); }
.coach-plan .cp-kg { color: var(--text); font-weight: 600; padding: 3px 0; }
.coach-plan .cp-reps { color: var(--text-muted); font-weight: 500; text-align: right; padding: 3px 0; }

/* ── Sync ──────────────────────────────────────────────────────── */
.btn-icon.synced { color: var(--green); border-color: rgba(34,197,94,0.25); }
.btn-icon.syncing { color: var(--accent); }
.btn-icon.unsynced { color: var(--yellow); border-color: rgba(234,179,8,0.25); }
.btn-icon .sync-dot {
  position: absolute; top: 6px; right: 6px; width: 6px; height: 6px;
  border-radius: 50%; background: var(--yellow);
}

.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface); border-top: 1px solid var(--border);
  border-radius: 18px 18px 0 0; width: 100%; max-width: 520px;
  padding: 20px 18px calc(24px + var(--safe-bottom));
  max-height: 90vh; overflow-y: auto;
  animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 36px; height: 4px; background: rgba(255,255,255,0.15);
  border-radius: 2px; margin: 0 auto 16px;
}
.modal-title {
  font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.modal-subtitle {
  font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 18px;
}
.modal-section { margin-bottom: 16px; }
.modal-label {
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px;
}
.modal-input {
  width: 100%; padding: 12px 14px; border-radius: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  color: var(--text); font-family: 'SF Mono', Menlo, monospace;
  font-size: 13px; outline: none;
}
.modal-input:focus { border-color: rgba(255,95,0,0.5); background: rgba(255,95,0,0.05); }
.modal-btn {
  width: 100%; padding: 14px; border-radius: 10px; border: none;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.modal-btn:active { transform: scale(0.98); }
.modal-btn-primary { background: var(--accent); color: #fff; }
.modal-btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
.modal-btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); margin-top: 8px; }

.modal-step {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
  font-size: 13px; line-height: 1.5;
}
.modal-step-num {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,95,0,0.12); color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
}
.modal-step a { color: var(--accent); font-weight: 600; text-decoration: none; }

.sync-status {
  padding: 10px 12px; border-radius: 8px; margin-bottom: 16px;

}
.sync-status .sync-status-label { color: var(--green); font-weight: 700; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.sync-status.error { background: rgba(239,68,68,0.06); border-color: rgba(239,68,68,0.2); }

.sync-banner {
  background: rgba(234,179,8,0.06); border: 1px solid rgba(234,179,8,0.2);

/* ── Animations ────────────────────────────────────────────────── */
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp 0.4s ease forwards; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }

/* ── Desktop ───────────────────────────────────────────────────── */
@media (min-width: 768px) {
  .main { padding: 24px 32px 40px; max-width: 680px; margin: 0 auto; }

// ── Cloud Sync (GitHub Gist) ──────────────────────────────────────────────
let syncConfig = JSON.parse(localStorage.getItem('curveGymSync') || 'null');
let syncStatus = 'idle'; // idle | syncing | synced | error | unconfigured
let syncError = '';
let syncPushTimer = null;
const GIST_FILENAME = 'curve-gym-data.json';
const GIST_DESCRIPTION = 'Curve Gym Dashboard — workout data';

function isSyncConfigured() { return syncConfig && syncConfig.token && syncConfig.gistId; }

function scheduleSyncPush() {
  if (!isSyncConfigured()) return;
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(syncPush, 1500);
}

async function syncPush() {
  if (!isSyncConfigured()) return;
  syncStatus = 'syncing'; renderSyncBtn();
  try {
    const resp = await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${syncConfig.token}`,
        'Accept': 'application/vnd.github+json',
      },
      body: JSON.stringify({
        files: { [GIST_FILENAME]: { content: JSON.stringify({ data, goal: currentGoal, savedAt: new Date().toISOString() }, null, 2) } }
      })
    });
    if (!resp.ok) throw new Error(`Push failed: ${resp.status}`);
    syncConfig.lastSync = new Date().toISOString();
    localStorage.setItem('curveGymSync', JSON.stringify(syncConfig));
    syncStatus = 'synced';
  } catch (e) {
    syncStatus = 'error'; syncError = e.message;
  }
  renderSyncBtn();
}

async function syncPull() {
  if (!isSyncConfigured()) return false;
  syncStatus = 'syncing'; renderSyncBtn();
  try {
    const resp = await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, {
      headers: { 'Authorization': `token ${syncConfig.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!resp.ok) throw new Error(`Pull failed: ${resp.status}`);
    const gist = await resp.json();
    const file = gist.files[GIST_FILENAME];
    if (file && file.content) {
      const parsed = JSON.parse(file.content);
      if (parsed.data) {
        data = parsed.data;
        if (parsed.goal) { currentGoal = parsed.goal; localStorage.setItem('curveGymGoal', currentGoal); }
        localStorage.setItem('curveGymDataV2', JSON.stringify(data));
      }
    }
    syncConfig.lastSync = new Date().toISOString();
    localStorage.setItem('curveGymSync', JSON.stringify(syncConfig));
    syncStatus = 'synced';
    renderSyncBtn();
    return true;
  } catch (e) {
    syncStatus = 'error'; syncError = e.message;
    renderSyncBtn();
    return false;
  }
}

async function syncSetup(token) {
  if (!token || !token.trim()) throw new Error('Token is required');
  token = token.trim();
  const headers = { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' };

  // Validate token by hitting /user
  const userResp = await fetch('https://api.github.com/user', { headers });
  if (!userResp.ok) throw new Error('Invalid token. Make sure it has the "gist" scope.');
  const user = await userResp.json();

  // Search existing gists for our gym data
  let page = 1, found = null;
  while (page <= 5 && !found) {
    const gistsResp = await fetch(`https://api.github.com/gists?per_page=100&page=${page}`, { headers });
    if (!gistsResp.ok) throw new Error('Failed to list gists');
    const gists = await gistsResp.json();
    if (gists.length === 0) break;
    found = gists.find(g => g.description === GIST_DESCRIPTION || (g.files && g.files[GIST_FILENAME]));
    page++;
  }

  let gistId, isNew = false;
  if (found) {
    gistId = found.id;
  } else {
    // Create new gist
    const createResp = await fetch('https://api.github.com/gists', {
      method: 'POST', headers,
      body: JSON.stringify({
        description: GIST_DESCRIPTION,
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify({ data, goal: currentGoal, savedAt: new Date().toISOString() }, null, 2) } }
      })
    });
    if (!createResp.ok) throw new Error('Failed to create gist');
    const newGist = await createResp.json();
    gistId = newGist.id;
    isNew = true;
  }

  syncConfig = { token, gistId, user: user.login, lastSync: new Date().toISOString() };
  localStorage.setItem('curveGymSync', JSON.stringify(syncConfig));

  // If found existing gist, pull data; otherwise we just pushed local data
  if (!isNew) await syncPull();

  syncStatus = 'synced';
  return { user: user.login, isNew };
}

function renderSyncBtn() {
  const btn = document.getElementById('syncBtn');
  if (!btn) return;
  btn.classList.remove('synced', 'syncing', 'unsynced');
  if (!isSyncConfigured()) {
    btn.classList.add('unsynced');
    btn.innerHTML = '&#9729;<span class="sync-dot"></span>';
  } else if (syncStatus === 'syncing') {
    btn.classList.add('syncing');
    btn.innerHTML = '<span class="spin" style="display:inline-block">&#8635;</span>';
  } else if (syncStatus === 'error') {
    btn.classList.add('unsynced');
    btn.innerHTML = '&#9888;';
  } else {
    btn.classList.add('synced');
    btn.innerHTML = '&#9729;';
  }
}

}

function timeAgo(isoStr) {
  if (!isoStr) return 'never';
  const diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

// ── Unit conversion (KG/LBS) ─────────────────────────────────────────────
// All weights stored internally in KG. Display unit is per-exercise.
const LB_PER_KG = 2.20462;
const KG_PER_LB = 0.453592;
function kgToLbs(kg) { return Math.round(kg * LB_PER_KG * 2) / 2; }
function lbsToKg(lbs) { return Math.round(lbs * KG_PER_LB * 2) / 2; }

function getExerciseUnit(split, name) {
  if (!data.exerciseUnits) data.exerciseUnits = {};
  return data.exerciseUnits[`${split}|${name}`] || 'kg';
}
function setExerciseUnit(split, name, unit) {
  if (!data.exerciseUnits) data.exerciseUnits = {};
  data.exerciseUnits[`${split}|${name}`] = unit;
  saveData();
}
function toggleExerciseUnit(split, name) {
  const cur = getExerciseUnit(split, name);
  setExerciseUnit(split, name, cur === 'kg' ? 'lbs' : 'kg');
  renderContent();
  renderCoach();
}
// Storage value (kg) → display value in given unit
function displayWeight(kgValue, unit) {
  if (kgValue === '' || kgValue === null || kgValue === undefined) return '';
  const num = parseFloat(kgValue);
  if (isNaN(num) || num === 0) return num === 0 ? 0 : '';
  return unit === 'lbs' ? kgToLbs(num) : num;
}
// User input in given unit → kg for storage
function inputToKg(inputVal, unit) {
  if (inputVal === '' || inputVal === null || inputVal === undefined) return '';
  const num = parseFloat(inputVal);
  if (isNaN(num)) return '';
  return unit === 'lbs' ? lbsToKg(num) : num;
}

// Key: split|exercise|week|setNum  -> { kg, reps }
function getSet(split, name, week, setNum) {
  return data.sets[`${split}|${name}|${week}|${setNum}`] || { kg: '', reps: '' };
}
function setSetVal(split, name, week, setNum, field, val) {
  const key = `${split}|${name}|${week}|${setNum}`;
  if (!data.sets[key]) data.sets[key] = { kg: '', reps: '' };
  data.sets[key][field] = val;
  saveData();
  renderStats();
  renderChart();
}

function getNutr(week, macro, day) { return data.nutrition[`${week}|${macro}|${day}`] || ''; }
function setNutr(week, macro, day, val) { data.nutrition[`${week}|${macro}|${day}`] = val; saveData(); renderStats(); }

// ── Volume calculations ──────────────────────────────────────────────────
function getExerciseVolume(split, name, week) {
  const ex = EXERCISES[split].find(e => e.name === name);
  if (!ex) return 0;
  let total = 0;
  for (let s = 1; s <= ex.sets; s++) {
    const v = getSet(split, name, week, s);
    total += (parseFloat(v.kg) || 0) * (parseFloat(v.reps) || 0);
  }
  return total;
}

function getWeekVol(split, week) {
  let total = 0;
  for (const ex of EXERCISES[split]) total += getExerciseVolume(split, ex.name, week);
  return total;
}

function getTotalVol(week) {
  return getWeekVol('push', week) + getWeekVol('pull', week) + getWeekVol('leg', week);
}

function getExProgress(split, name, week) {
  if (week <= 1) return 'none';
  const cv = getExerciseVolume(split, name, week);
  const pv = getExerciseVolume(split, name, week - 1);
  if (!cv || !pv) return 'none';
  return cv > pv ? 'up' : cv < pv ? 'down' : 'same';
}

function getFilledWeeks() {
  const weeks = new Set();
  for (const key of Object.keys(data.sets)) {
    const v = data.sets[key];
    if (v.kg || v.reps) weeks.add(parseInt(key.split('|')[2]));
  }
  return weeks;
}

function countFilledExercises(split, week) {
  let filled = 0;
  for (const ex of EXERCISES[split]) {
    let hasSets = false;
    for (let s = 1; s <= ex.sets; s++) {
      const v = getSet(split, ex.name, week, s);
      if (v.kg && v.reps) { hasSets = true; break; }
    }
    if (hasSets) filled++;
  }
  return filled;
}

// ── RPT Helpers ──────────────────────────────────────────────────────────
function rptDropWeight(kg, setIndex) {
  // Each subsequent set drops ~10%
  return Math.round(kg * Math.pow(0.9, setIndex) * 2) / 2; // round to 0.5
}

function getSmartPlaceholder(split, ex, setNum) {
  // For RPT: cascade from Set 1 weight with 10% drops
  // For Kino: use Set 1 weight for all sets
  if (ex.method === 'rpt' && setNum > 1) {
    // Check if Set 1 has kg this week
    const s1 = getSet(split, ex.name, currentWeek, 1);
    const s1kg = parseFloat(s1.kg) || 0;
    if (s1kg > 0) {
      return rptDropWeight(s1kg, setNum - 1);
    }
    // Check previous set this week
    const prev = getSet(split, ex.name, currentWeek, setNum - 1);
    const prevKg = parseFloat(prev.kg) || 0;
    if (prevKg > 0) return rptDropWeight(prevKg, 1);
  }

  if (ex.method === 'kino' && setNum > 1) {
    // Same weight across all sets — show Set 1 weight
    const s1 = getSet(split, ex.name, currentWeek, 1);
    if (parseFloat(s1.kg) > 0) return s1.kg;
  }

  // Fallback: previous week's same set
  if (currentWeek > 1) {
    const pv = getSet(split, ex.name, currentWeek - 1, setNum);
    if (pv.kg) return pv.kg;
  }
  return '—';
}

        </div>
      `;
      return;
    }
    const totalSessions = sessions.length;
    const totalCal = sessions.reduce((s, g) => s + g.cal, 0);
    const avgDur = Math.round(sessions.reduce((s, g) => s + g.dur_min, 0) / totalSessions);
    const extraStat = garminSubTab === 'jumprope'

      </div>

      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Duration</div>
        <div class="stat-value">${avgDur} <span class="stat-unit">min</span></div>
      </div>
      ${extraStat}
    `;
    return;
  }

  const vol = getTotalVol(currentWeek);
  const prevVol = currentWeek > 1 ? getTotalVol(currentWeek - 1) : 0;
  const delta = prevVol ? ((vol - prevVol) / prevVol * 100).toFixed(1) : 0;

  let filled = 0, total = 0;
  if (currentTab !== 'nutrition') {
    total = EXERCISES[currentTab].length;
    filled = countFilledExercises(currentTab, currentWeek);
  }

  let prs = 0;
  for (const split of ['push','pull','leg']) {
    for (const ex of EXERCISES[split]) {
      let maxV = 0;
      for (let w = 1; w <= WEEKS; w++) maxV = Math.max(maxV, getExerciseVolume(split, ex.name, w));
      const cv = getExerciseVolume(split, ex.name, currentWeek);
      if (cv > 0 && cv >= maxV) prs++;
    }

  const goalBadge = { cut: '🔥 CUT', maintain: '⚖️ HOLD', bulk: '💪 BULK' }[currentGoal];

  row.innerHTML = `
    <div class="stat-card featured">
      <div class="stat-label">Week ${currentWeek} Volume</div>
      <div class="stat-value">${vol ? vol.toLocaleString() : '—'} <span class="stat-unit">kg</span></div>
      ${prevVol && vol ? `<div class="stat-delta ${delta > 0 ? 'up' : delta < 0 ? 'down' : 'same'}">${delta > 0 ? '+' : ''}${delta}% vs W${currentWeek - 1}</div>` : ''}
    </div>
    <div class="stat-card">
      <div class="stat-label">Logged</div>
      <div class="stat-value">${currentTab !== 'nutrition' ? filled + '/' + total : '—'}</div>

    <div class="stat-card">

}

function renderExercises(split) {
  const exercises = EXERCISES[split];
  let html = '<div class="exercise-list">';

  for (const ex of exercises) {
    const vol = getExerciseVolume(split, ex.name, currentWeek);
    const prevVol = currentWeek > 1 ? getExerciseVolume(split, ex.name, currentWeek - 1) : 0;
    const status = getExProgress(split, ex.name, currentWeek);
    const pctChange = prevVol > 0 ? ((vol - prevVol) / prevVol * 100).toFixed(0) : null;
    const hasData = vol > 0;

    let maxVol = 0;
    for (let w = 1; w <= WEEKS; w++) maxVol = Math.max(maxVol, getExerciseVolume(split, ex.name, w));
    const barPct = maxVol > 0 ? Math.round(vol / maxVol * 100) : 0;
    const barColor = status === 'up' ? 'var(--green)' : status === 'down' ? 'var(--red)' : status === 'same' ? 'var(--yellow)' : 'var(--accent)';

    const statusLabel = { up: '+' + pctChange + '%', down: pctChange + '%', same: '0%', none: '—' }[status];

    // Method info
    const methodLabel = ex.method === 'rpt' ? 'RPT' : 'KINO';
    const methodCls = ex.method;
    const unit = getExerciseUnit(split, ex.name);
    const unitLabel = unit.toUpperCase();

    // Meta text
    const metaTarget = ex.method === 'rpt'
      ? ex.targets.join(', ') + ' reps'
      : ex.targets[0] + ' reps';
    const restTime = ex.method === 'rpt' ? '3 min rest' : '2 min rest';

    html += `
      <div class="exercise-card ${hasData ? 'has-data' : ''}">
        <div class="exercise-card-header">
          <div>
            <div class="exercise-name">
              ${ex.name}
              <span class="method-badge ${methodCls}">${methodLabel}</span>
              <button class="unit-toggle ${unit}" onclick="event.stopPropagation();toggleExerciseUnit('${split}','${ex.name.replace(/'/g, "\\'")}')">${unitLabel}</button>
            </div>
            <div class="exercise-meta">${ex.sets} sets &middot; ${metaTarget} &middot; ${restTime}</div>
          </div>
          <span class="exercise-badge ${status}">${statusLabel}</span>
        </div>
        <div class="sets-container">
          <div class="set-header">
            <span>Set</span><span>${unitLabel}</span><span>Reps</span>
          </div>`;

    for (let s = 1; s <= ex.sets; s++) {
      const sv = getSet(split, ex.name, currentWeek, s);
      const prevSv = currentWeek > 1 ? getSet(split, ex.name, currentWeek - 1, s) : { kg: '', reps: '' };
      const kgFilled = sv.kg ? 'filled' : '';
      const repsFilled = sv.reps ? 'filled' : '';

      // Smart placeholder for kg (in storage units), then convert to display unit
      const phKg = getSmartPlaceholder(split, ex, s);
      const kgPlaceholder = (typeof phKg === 'number' || (typeof phKg === 'string' && phKg !== '—'))
        ? displayWeight(phKg, unit) : '—';
      const repsPlaceholder = prevSv.reps || '—';

      // Display value: convert kg-stored to current display unit
      const displayedVal = sv.kg !== '' ? displayWeight(sv.kg, unit) : '';

      // Set label with target
      const setTarget = ex.targets[s - 1] || '';
      const isHeavy = ex.method === 'rpt' && s === 1;

      html += `
          <div class="set-row">
            <div class="set-label ${isHeavy ? 'heavy' : ''}">
              S${s}${isHeavy ? ' ⚡' : ''}
              <span class="set-target-hint">${setTarget}</span>
            </div>
            <input class="set-input ${kgFilled}" type="number" inputmode="decimal" placeholder="${kgPlaceholder}"
              value="${displayedVal}"
              onchange="setSetVal('${split}','${ex.name}',${currentWeek},${s},'kg',inputToKg(this.value,'${unit}'));renderContent()"
              onfocus="this.select()">
            <input class="set-input ${repsFilled}" type="number" inputmode="numeric" placeholder="${repsPlaceholder}"
              value="${sv.reps}"
              onchange="setSetVal('${split}','${ex.name}',${currentWeek},${s},'reps',this.value);renderContent()"
              onfocus="this.select()">
          </div>`;
    }

    html += `</div>`;

    if (prevVol > 0) {
      html += `<div class="exercise-prev">
        <span class="prev-label">Last week total vol: </span>
        <span class="prev-value">${prevVol.toLocaleString()} kg</span>
      </div>`;
    }

    html += `<div class="card-progress-bar"><div class="card-progress-fill" style="width:${barPct}%;background:${barColor}"></div></div></div>`;
  }
  html += '</div>';
  return html;
}

    const avg = count > 0 ? Math.round(total / count) : 0;

    const pct = target ? Math.min(100, Math.round(avg / target * 100)) : 0;
    html += `

      </div>`;
  }
  html += '</div>';

  for (const day of DAYS) {
    html += `<div class="nutrition-day-card"><div class="nutrition-day-header">${day}</div><div class="nutrition-day-inputs">`;

function renderChart() {
  const section = document.getElementById('chartSection');
  if (currentTab === 'garmin') { section.style.display = 'none'; return; }
  section.style.display = 'block';

  const canvas = document.getElementById('volumeChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = (rect.width - 24) * dpr;
  canvas.height = 200 * dpr;
  canvas.style.width = (rect.width - 24) + 'px';
  canvas.style.height = '200px';
  ctx.scale(dpr, dpr);

  const W = rect.width - 24, H = 200;
  ctx.clearRect(0, 0, W, H);

  const pad = { top: 20, right: 10, bottom: 30, left: 44 };
  const w = W - pad.left - pad.right, h = H - pad.top - pad.bottom;

  const vols = [];
  for (let i = 1; i <= WEEKS; i++) vols.push(getTotalVol(i));
  const maxVol = Math.max(...vols, 1);

  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.top + (h / 3) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + w, y); ctx.stroke();
    ctx.fillStyle = 'rgba(229,226,225,0.25)';
    ctx.font = '9px Cabinet Grotesk, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVol - (maxVol / 3) * i).toLocaleString(), pad.left - 6, y + 3);
  }

  ctx.fillStyle = 'rgba(229,226,225,0.3)';
  ctx.textAlign = 'center';
  for (let i = 0; i < WEEKS; i++) {
    ctx.fillText(i + 1, pad.left + (w / (WEEKS - 1)) * i, H - 8);
  }

  const pts = [];
  for (let i = 0; i < WEEKS; i++) {
    pts.push({ x: pad.left + (w / (WEEKS - 1)) * i, y: pad.top + h - (vols[i] / maxVol) * h, v: vols[i] });
  }

  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + h);
  grad.addColorStop(0, 'rgba(255,95,0,0.12)'); grad.addColorStop(1, 'rgba(255,95,0,0.0)');
  ctx.beginPath(); ctx.moveTo(pts[0].x, pad.top + h);
  for (const p of pts) ctx.lineTo(p.x, p.y);
  ctx.lineTo(pts[pts.length - 1].x, pad.top + h); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.strokeStyle = '#FF5F00'; ctx.lineWidth = 2; ctx.stroke();

  for (let i = 0; i < pts.length; i++) {
    if (pts[i].v > 0) {
      const cur = i + 1 === currentWeek;
      ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, cur ? 5 : 3, 0, Math.PI * 2);
      ctx.fillStyle = cur ? '#FF5F00' : 'rgba(255,95,0,0.5)'; ctx.fill();
      if (cur) { ctx.strokeStyle = 'rgba(255,95,0,0.25)'; ctx.lineWidth = 6; ctx.stroke(); }
    }
  }
}

// ── Coach (Greek God 2.0 RPT Logic) ─────────────────────────────────────
// Returns { nextKg, directive, plan[] } for an RPT exercise
function getRptPrescription(split, ex) {
  const goal = currentGoal;
  const [s1min, s1max] = ex.targets[0].split('-').map(Number);
  const isLeg = split === 'leg';
  const increment = isLeg ? 5 : 2.5;

  // Find most recent Set 1 data (this week or previous)
  let baseKg = 0, baseReps = 0, sourceWeek = 0;
  for (let w = currentWeek; w >= 1; w--) {
    const sv = getSet(split, ex.name, w, 1);
    const kg = parseFloat(sv.kg) || 0;
    if (kg > 0) { baseKg = kg; baseReps = parseFloat(sv.reps) || 0; sourceWeek = w; break; }
  }
  if (!baseKg) return null;

  // Check if previous week ALSO hit top of range
  let prevHitTop = false;
  if (sourceWeek > 1) {
    const ps = getSet(split, ex.name, sourceWeek - 1, 1);
    prevHitTop = (parseFloat(ps.reps) || 0) >= s1max && (parseFloat(ps.kg) || 0) > 0;
  }

  // Decide next session weight + directive
  let nextKg = baseKg, directive = 'hold';

  if (baseReps >= s1max) {
    // Hit top of range
    if (goal === 'bulk') {
      nextKg = baseKg + increment; directive = 'up';
    } else if (goal === 'maintain' && prevHitTop) {
      nextKg = baseKg + increment; directive = 'up';
    } else {
      directive = 'hold'; // cut always holds; maintain holds first time
    }
  } else if (baseReps >= s1min) {
    directive = 'hold';
  } else {
    // Below range
    if (goal === 'cut' || (baseReps < s1min && sourceWeek > 1)) {
      // Check if below range 2 weeks running
      const ps = getSet(split, ex.name, sourceWeek - 1, 1);
      const prevBelow = (parseFloat(ps.reps) || 99) < s1min;
      if (prevBelow && goal !== 'bulk') {
        nextKg = baseKg - increment; directive = 'drop';
      }
    }
  }

  // Build per-set plan
  const plan = [];
  for (let s = 1; s <= ex.sets; s++) {
    plan.push({ set: s, kg: rptDropWeight(nextKg, s - 1), reps: ex.targets[s - 1] });
  }

  return { nextKg, directive, plan, baseKg, baseReps };
}

// Returns { nextKg, directive, reps } for a Kino exercise
function getKinoPrescription(split, ex) {
  const goal = currentGoal;
  const [minRep, maxRep] = ex.targets[0].split('-').map(Number);
  const isLeg = split === 'leg';
  const increment = isLeg ? 5 : 2.5;

  // Find most recent data
  let kgUsed = 0, lowestReps = Infinity, filledSets = 0, sourceWeek = 0;

  for (let w = currentWeek; w >= 1; w--) {
    let wKg = 0, wMin = Infinity, wFilled = 0;
    for (let s = 1; s <= ex.sets; s++) {
      const sv = getSet(split, ex.name, w, s);
      const kg = parseFloat(sv.kg) || 0;
      const reps = parseFloat(sv.reps) || 0;
      if (kg > 0 && reps > 0) { wKg = Math.max(wKg, kg); wMin = Math.min(wMin, reps); wFilled++; }
    }
    if (wFilled > 0) { kgUsed = wKg; lowestReps = wMin; filledSets = wFilled; sourceWeek = w; break; }
  }
  if (!kgUsed) return null;

  const allHitTop = lowestReps >= maxRep && filledSets === ex.sets;

  let nextKg = kgUsed, directive = 'hold';

  if (allHitTop) {
    if (goal === 'bulk') {
      nextKg = kgUsed + increment; directive = 'up';
    } else if (goal === 'maintain') {
      // Check previous week
      let prevAllHit = sourceWeek > 1;
      if (prevAllHit) {
        for (let s = 1; s <= ex.sets; s++) {
          const pv = getSet(split, ex.name, sourceWeek - 1, s);
          if ((parseFloat(pv.reps) || 0) < maxRep) { prevAllHit = false; break; }
        }
      }
      if (prevAllHit) { nextKg = kgUsed + increment; directive = 'up'; }
    }
    // cut: hold
  } else if (lowestReps < minRep && goal !== 'bulk') {
    // Check if below range 2 weeks
    if (sourceWeek > 1) {
      let prevBelow = false;
      for (let s = 1; s <= ex.sets; s++) {
        const pv = getSet(split, ex.name, sourceWeek - 1, s);
        if ((parseFloat(pv.reps) || 0) < minRep) { prevBelow = true; break; }
      }
      if (prevBelow) { nextKg = kgUsed - increment; directive = 'drop'; }
    }
  }

  return { nextKg, directive, reps: ex.targets[0], sets: ex.sets };
}

function renderCoach() {
  const box = document.getElementById('coachBox');
  if (currentTab === 'nutrition' || currentTab === 'garmin') { box.innerHTML = ''; return; }

  const split = currentTab;
  const exercises = EXERCISES[split];
  let rows = [];
  let warmupHtml = '';
  let hasAnyData = false;

  for (const ex of exercises) {
    const unit = getExerciseUnit(split, ex.name);
    const unitLabel = unit.toUpperCase();

    if (ex.method === 'rpt') {
      const rx = getRptPrescription(split, ex);
      if (!rx) continue;
      hasAnyData = true;

      // Warmup for first RPT exercise only — display in that exercise's unit
      if (!warmupHtml) {
        const wkg = rx.plan[0].kg;
        const w60 = displayWeight(Math.round(wkg * 0.6 * 2) / 2, unit);
        const w75 = displayWeight(Math.round(wkg * 0.75 * 2) / 2, unit);
        const w90 = displayWeight(Math.round(wkg * 0.9 * 2) / 2, unit);
        warmupHtml = `<div class="coach-warmup"><strong>Warmup</strong> &nbsp; <span class="wu">${w60} ${unitLabel}</span> x5 &rarr; <span class="wu">${w75} ${unitLabel}</span> x3 &rarr; <span class="wu">${w90} ${unitLabel}</span> x1 &rarr; rest 3 min</div>`;
      }

      // Build set plan grid (display in exercise's unit)
      let planHtml = '<div class="coach-plan">';
      for (const p of rx.plan) {
        const dispKg = displayWeight(p.kg, unit);
        planHtml += `<div class="cp-set ${p.set === 1 ? 'heavy' : ''}">S${p.set}${p.set === 1 ? ' ⚡' : ''}</div><div class="cp-kg">${dispKg} ${unitLabel}</div><div class="cp-reps">${p.reps} reps</div>`;
      }
      planHtml += '</div>';

      const nextDisp = displayWeight(rx.nextKg, unit);
      const dirLabel = { hold: 'HOLD', up: `UP → ${nextDisp}`, drop: `DROP → ${nextDisp}` }[rx.directive];

      rows.push(`
        <div class="coach-ex-row">
          <div class="coach-ex-top">
            <div class="coach-ex-name"><span class="method-badge rpt">RPT</span>${ex.name}</div>
            <span class="coach-directive ${rx.directive}">${dirLabel}</span>
          </div>
          ${planHtml}
        </div>`);

    } else if (ex.method === 'kino') {
      const rx = getKinoPrescription(split, ex);
      if (!rx) continue;
      hasAnyData = true;

      const nextDisp = displayWeight(rx.nextKg, unit);
      const dirLabel = { hold: 'HOLD', up: `UP → ${nextDisp}`, drop: `DROP → ${nextDisp}` }[rx.directive];

      rows.push(`
        <div class="coach-ex-row">
          <div class="coach-ex-top">
            <div class="coach-ex-name"><span class="method-badge kino">KINO</span>${ex.name}</div>
            <span class="coach-directive ${rx.directive}">${dirLabel}</span>
          </div>
          <div class="coach-plan">
            <div class="cp-set">All ${rx.sets}</div><div class="cp-kg">${nextDisp} ${unitLabel}</div><div class="cp-reps">${rx.reps} reps</div>
          </div>
        </div>`);
    }
  }

  if (!hasAnyData) {
    box.innerHTML = `
      <div class="coach-box">
        <div class="coach-header">
          <div class="coach-icon">&#9889;</div>
          <div class="coach-title">Next Session</div>
        </div>
        <div class="coach-empty">Log your sets above and your next session plan will appear here — exact weights and rep targets for every exercise.</div>
      </div>`;
    return;
  }

  box.innerHTML = `
    <div class="coach-box">
      <div class="coach-header">
        <div class="coach-icon">&#9889;</div>
        <div class="coach-title">Next Session Plan</div>
      </div>
      ${warmupHtml}
      ${rows.join('')}
    </div>`;
}

function render() {
  renderGoalBar(); renderBottomNav(); renderDesktopTabs(); renderWeekScroll();
  renderStats(); renderContent(); renderChart(); renderCoach();
  renderSyncBtn(); renderSyncBanner();
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'gym-tracker-export.json'; a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try { data = JSON.parse(ev.target.result); saveData(); render(); }
      catch { alert('Invalid file'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

currentWeek = Math.max(1, ...Array.from(getFilledWeeks()));
if (!getFilledWeeks().size) currentWeek = 1;
render();
window.addEventListener('resize', renderChart);

// Auto-pull from cloud on app load if sync is configured
(async function initSync() {
  if (isSyncConfigured()) {
    const ok = await syncPull();
    if (ok) {
      currentWeek = Math.max(1, ...Array.from(getFilledWeeks()));
      if (!getFilledWeeks().size) currentWeek = 1;
      render();
    }
  } else {
    syncStatus = 'unconfigured';
    renderSyncBtn();
  }
})();

// Push any pending changes when coming back online
window.addEventListener('online', () => { if (isSyncConfigured()) syncPush(); });
